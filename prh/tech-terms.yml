  - expected: 確率的勾配降下法
    patterns:
      - 確率勾配降下法

  - expected: 誤差逆伝播法
    patterns:
      - 誤差逆伝搬法
      - 逆誤差伝播法
      - バックプロパゲーション
      - バック・プロパゲーション

  - expected: 特徴量
    patterns:
      - 特徴マップ  # 文脈依存だが feature map は特徴マップのほうが正確

  - expected: エンコーダ・デコーダ
    patterns:
      - エンコーダデコーダ
      - エンコーダ／デコーダ

  # ============================================================
  # 評価指標
  # ============================================================
  - expected: 適合率
    patterns:
      - 精度  # Precision の文脈限定（文脈によっては曖昧なため注意）

  - expected: 再現率
    patterns:
      - 検出率  # Recall の文脈

  - expected: F1スコア
    patterns:
      - F1値
      - /F1-スコア/
      - F値

  - expected: 平均適合率
    patterns:
      - 平均精度

  - expected: 平均二乗誤差
    patterns:
      - 二乗平均誤差
      - 二乗平均二乗誤差

