      - マルチヘッドアテンション
      - マルチヘッド・アテンション
      - 多頭注意機構

  - expected: ドロップアウト
    patterns:
      - ドロップ・アウト
      - ドロップ・アウト層

  - expected: バッチ正規化
    patterns:
      - バッチ正則化
      - バッチ・正規化

  - expected: 層正規化
    patterns:
      - 層正則化
      - レイヤー正規化
      - レイヤ正規化

  - expected: 活性化関数
    patterns:
      - 活性関数
      - 活性化関数

  - expected: 損失関数
    patterns:
      - ロス関数
      - ロスト関数

  - expected: 目的関数
    patterns:
      - 目標関数

  - expected: 勾配降下法
    patterns:
