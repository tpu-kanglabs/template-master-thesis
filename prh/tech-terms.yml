version: 1
rules:
  # ============================================================
  # 深層学習・機械学習用語
  # ============================================================
  - expected: ニューラルネットワーク
    patterns:
      - ニューラル・ネットワーク
      - ニューラルネットワーク  # 同形は無視されるが念のため

  - expected: 畳み込みニューラルネットワーク
    patterns:
      - 畳込みニューラルネットワーク
      - 畳み込みニューラル・ネットワーク

  - expected: 再帰型ニューラルネットワーク
    patterns:
      - 再帰的ニューラルネットワーク
      - 再帰ニューラルネットワーク

  - expected: 敵対的生成ネットワーク
    patterns:
      - 生成的敵対ネットワーク
      - 敵対的生成的ネットワーク

  - expected: 変分オートエンコーダ
    patterns:
      - 変分オートエンコーダー
      - 変分自己符号化器
      - 変分オート・エンコーダ

  - expected: オートエンコーダ
    patterns:
      - オートエンコーダー
      - オート・エンコーダ
      - オート・エンコーダー
      - 自己符号化器

  - expected: ハイパーパラメータ
    patterns:
      - ハイパーパラメーター
      - ハイパー・パラメータ
      - ハイパー・パラメーター

  - expected: ファインチューニング
    patterns:
      - ファイン・チューニング
      - ファインチュー二ング
      - ファイン・チュー二ング

  - expected: データセット
    patterns:
      - データ・セット
      - データーセット

  - expected: データ拡張
    patterns:
      - データ・拡張
      - データオーグメンテーション

  - expected: 過学習
    patterns:
      - オーバーフィッティング
      - オーバフィッティング

  - expected: 汎化性能
    patterns:
      - 汎化能力

  - expected: 転移学習
    patterns:
      - 転写学習

  - expected: 自己教師あり学習
    patterns:
      - 自己教師学習
      - 自己指導学習

  - expected: 強化学習
    patterns:
      - 報酬学習

  - expected: アテンション機構
    patterns:
      - アテンション・機構
      - 注意機構
      - アテンションメカニズム

  - expected: 自己アテンション
    patterns:
      - 自己注意機構
      - セルフアテンション
      - セルフ・アテンション

  - expected: 多頭アテンション
