name: Build LaTeX

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tex"
      - "**/*.bib"
      - ".latexmkrc"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "**/*.tex"
      - "**/*.bib"
      - ".latexmkrc"
      - ".github/workflows/build.yml"

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tpu-kanglabs/texlive:latest
    strategy:
      matrix:
        document:
          - name: thesis
            file: thesis.tex
            artifact: thesis-pdf
            output: out/thesis.pdf
          - name: abstract
            file: abstract.tex
            artifact: abstract-pdf
            output: out/abstract.pdf
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/biber
          key: biber-${{ matrix.document.name }}-${{ hashFiles('bibliography/*.bib') }}
          restore-keys: biber-${{ matrix.document.name }}-

      - name: Build ${{ matrix.document.name }}
        run: latexmk ${{ matrix.document.file }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.document.artifact }}
          path: ${{ matrix.document.output }}
