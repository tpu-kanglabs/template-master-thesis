name: Docker image

on:
  push:
    branches:
      - main
    paths:
      - .devcontainer/Dockerfile
      - .mise.toml
  pull_request:
    paths:
      - .devcontainer/Dockerfile
      - .mise.toml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request' && github.repository == 'tpu-kanglabs/template-master-thesis'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: ${{ github.event_name != 'pull_request' && github.repository == 'tpu-kanglabs/template-master-thesis' }}
          tags: ghcr.io/${{ github.repository_owner }}/texlive:latest
