[tools]
node = "24"
"github:pnpm/pnpm" = "11"
uv = "0.11"

[tasks.abstract]
description = "Compile the abstract"
run = "latexmk abstract.tex"
sources = [
    "abstract.tex",
    "meta.tex",
    ".latexmkrc",
    "bibliography/*.bib",
    "figures/*",
    "latex/*",
]
[tasks.thesis]
description = "Compile the thesis"
run = "latexmk thesis.tex"
sources = [
    "thesis.tex",
    "meta.tex",
    ".latexmkrc",
    "bibliography/*.bib",
    "figures/*",
    "latex/*",
    "chapters/*",
]
[tasks.all]
description = "Compile everything"
depends = ["abstract", "thesis"]

[tasks."format:latex"]
run = "latexindent -c out -s --overwrite *.tex chapters/*.tex"
[tasks."format:py"]
run = "uv run ruff format"
[tasks.format]
depends = ["format:*"]

[tasks."format-check:latex"]
run = "latexindent -k -s -c out *.tex chapters/*.tex"
[tasks."format-check:py"]
run = "uv run ruff format --check"
[tasks."format-check"]
depends = ["format-check:*"]

[tasks."lint:docs"]
run = "pnpm lint"
[tasks."lint:py"]
run = ["uv run ruff check", "uv run pyrefly check --summarize-errors"]
[tasks.lint]
depends = ["lint:*"]

[tasks."pre-commit"]
run = "uv run pre-commit run --all-files"
